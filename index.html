<!DOCTYPE html>
<html lang="en">
 <head>
 <meta charset="UTF-8">

 <title>Minigames HUB</title>

 <link rel="stylesheet" href="minigames-hub.css"></link>
 <link rel="stylesheet" href="mobile.css"></link>

 </head>
 <body>
 <header id="header"> 
    <h1> 
        Welcome to the Minigames Hub 
    </h1>
 </header>
 <main class="minigames-flex">

    <h2 class="first-minigame-title"> 
     Rock, Paper and Scissors
    </h2>

    <button class="btn-minigame-1" loading="lazy"
    onclick="window.location.href='Rock-Paper-Scissors-game/rock-paper-scissors.html'">  
     Start First Minigame
    </button>


    <h2 class="second-minigame-title"> 
     Quick Quiz
    </h2>

    <button class="btn-minigame-2" loading="lazy"
    onclick="window.location.href='Quiz-game/quiz.html'">
     Start Second Minigame
    </button>

    
    <h2 class="third-minigame-title"> 
     Flip a Coin
    </h2>

    <button class="btn-minigame-3" loading="lazy"
    onclick="window.location.href='flip-a-coin-game/flip-coin.html'">
     Start Third Minigame
    </button>

    <h2 class="fourth-minigame-title placeholder"> 
     Coming Soon...
    </h2>
 </main>


 </body>
</html>
